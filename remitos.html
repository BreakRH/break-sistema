<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remitos de Traslado — Break 7.52</title>
<script>if(window.parent!==window)document.documentElement.classList.add('in-iframe');</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0e;--surface:#161616;--surface2:#1f1f1f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0ede8;--muted:#777;
  --accent:#e8c87a;--accent-dim:rgba(232,200,122,0.12);
  --red:#e05555;--red-dim:rgba(224,85,85,0.12);
  --green:#5dbf8a;--green-dim:rgba(93,191,138,0.12);
  --blue:#6aabda;--blue-dim:rgba(106,171,218,0.12);
  --purple:#a07edd;--purple-dim:rgba(160,126,221,0.12);
  --orange:#e8935a;--orange-dim:rgba(232,147,90,0.12);
  --radius:10px;--radius-lg:16px;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;line-height:1.6;}

#loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:12px;color:var(--muted);font-family:var(--mono);}

#splash{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2.5rem;}
html.in-iframe #splash{display:none!important;}
html.in-iframe #loading-overlay{display:none!important;}
.logo-block{text-align:center;}
.logo-label{font-size:11px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-family:var(--mono);}
.logo-title{font-size:2.4rem;font-weight:800;line-height:1.1;}
.logo-title span{color:var(--accent);}
.logo-sub{font-size:13px;color:var(--muted);margin-top:6px;font-family:var(--mono);}
.splash-stats{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center;}
.splash-stat{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:12px 20px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:110px;}
.splash-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-family:var(--mono);}
.splash-stat-val{font-size:1.6rem;font-weight:800;font-family:var(--mono);}
.sv-active{color:var(--accent);}
.sv-done{color:var(--green);}

.login-box{width:100%;max-width:400px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;display:flex;flex-direction:column;gap:1.2rem;}
.login-box h2{font-size:1rem;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;font-family:var(--mono);}
.field-group{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--mono);}

select,input[type="text"],input[type="password"],input[type="number"],textarea{
  background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);
  color:var(--text);font-family:var(--mono);font-size:15px;padding:13px 14px;
  width:100%;outline:none;transition:border-color 0.15s;appearance:none;resize:vertical;
  min-height:48px;
}
select:focus,input:focus,textarea:focus{border-color:var(--accent);background:#1a1a1a;}
select option{background:#111;}

.btn{padding:14px 20px;border-radius:var(--radius);border:none;font-family:var(--display);font-weight:700;font-size:14px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:0.02em;min-height:50px;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--accent);color:#0e0e0e;width:100%;box-shadow:0 4px 14px rgba(232,200,122,0.22);}
.btn-primary:hover{opacity:0.88;box-shadow:0 6px 20px rgba(232,200,122,0.32);}
.btn-danger{background:var(--red-dim);color:var(--red);border:0.5px solid var(--red);font-size:13px;padding:10px 16px;min-height:44px;}
.btn-ghost{background:transparent;color:var(--muted);border:0.5px solid var(--border2);font-size:13px;padding:10px 16px;min-height:44px;}
.btn-ghost:hover{color:var(--text);}
.btn-step{background:var(--green-dim);color:var(--green);border:0.5px solid rgba(93,191,138,0.4);font-size:13px;padding:11px 18px;font-family:var(--display);font-weight:700;cursor:pointer;border-radius:var(--radius);transition:opacity 0.15s;min-height:46px;}
.btn-step:hover{opacity:0.8;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:7px;min-height:40px;}
.err-msg{font-size:12px;color:var(--red);font-family:var(--mono);display:none;}

#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:rgba(14,14,14,0.96);backdrop-filter:blur(8px);z-index:100;min-height:60px;}
.topbar-left{display:flex;flex-direction:column;justify-content:center;padding:10px 0;gap:2px;}
.topbar-brand{font-size:15px;font-weight:800;letter-spacing:0.02em;line-height:1;}
.topbar-brand span{color:var(--accent);}
.topbar-sub{font-size:11px;font-family:var(--mono);color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-user{font-size:12px;color:var(--muted);font-family:var(--mono);}
.role-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-family:var(--mono);font-weight:500;}
.btn-logout{background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--mono);padding:4px 8px;border-radius:6px;}
.btn-logout:hover{color:var(--text);background:var(--surface2);}
body.in-iframe .topbar{display:none;}
html.in-iframe .topbar{display:none;}

.main-content{flex:1;padding:24px;max-width:820px;margin:0 auto;width:100%;}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border-radius:var(--radius);padding:4px;border:0.5px solid var(--border);}
.tab-btn{flex:1;padding:11px 6px;border:none;background:transparent;color:var(--muted);font-family:var(--display);font-weight:600;font-size:13px;cursor:pointer;border-radius:8px;transition:all 0.15s;white-space:nowrap;min-height:44px;}
.tab-btn.active{background:var(--surface2);color:var(--text);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.4rem;margin-bottom:16px;}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);font-family:var(--mono);margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid .full{grid-column:1/-1;}

/* ── Remito card ── */
.remito-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:1.4rem;margin-bottom:14px;cursor:pointer;transition:border-color 0.15s;}
.remito-card:hover{border-color:rgba(232,200,122,0.3);}
.remito-card.completed{border-color:rgba(93,191,138,0.25);}
.remito-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.remito-id{font-size:11px;color:var(--muted);font-family:var(--mono);}
.remito-title{font-size:15px;font-weight:700;color:var(--text);margin-top:2px;line-height:1.3;}
.remito-route{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:5px;}
.route-store{font-weight:600;}
.remito-status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-family:var(--mono);font-weight:500;flex-shrink:0;}
.status-active{background:var(--accent-dim);color:var(--accent);border:0.5px solid rgba(232,200,122,0.3);}
.status-done{background:var(--green-dim);color:var(--green);border:0.5px solid rgba(93,191,138,0.3);}

.progress-wrap{margin-bottom:10px;}
.progress-bar-bg{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.progress-bar-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s ease;}
.progress-label{font-size:10px;color:var(--muted);font-family:var(--mono);}

/* ── Productos table ── */
.prod-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
.prod-table th{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-family:var(--mono);padding:6px 10px;text-align:left;border-bottom:0.5px solid var(--border2);}
.prod-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);font-size:13px;vertical-align:middle;}
.prod-table tr:last-child td{border-bottom:none;}
.prod-table input[type="number"]{padding:5px 8px;font-size:13px;width:80px;}
.prod-table input[type="text"]{padding:5px 8px;font-size:13px;}
.qty-solicitada{font-family:var(--mono);font-weight:600;color:var(--text);}
.qty-confirmada{font-family:var(--mono);font-weight:600;}
.qty-match{color:var(--green);}
.qty-diff{color:var(--orange);}
.qty-pending{color:var(--muted);}
.diff-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-family:var(--mono);font-weight:500;margin-left:4px;}
.diff-ok{background:var(--green-dim);color:var(--green);}
.diff-mod{background:var(--orange-dim);color:var(--orange);}

/* ── Etapas ── */
.etapas-list{display:flex;flex-direction:column;}
.etapa-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.etapa-row:last-child{border-bottom:none;}
.etapa-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;margin-top:2px;border:0.5px solid var(--border2);}
.ei-done{background:var(--green-dim);border-color:rgba(93,191,138,0.4);color:var(--green);}
.ei-current{background:var(--accent-dim);border-color:rgba(232,200,122,0.4);color:var(--accent);}
.ei-pending{background:transparent;color:var(--muted);}
.etapa-body{flex:1;}
.etapa-name{font-size:13px;font-weight:600;}
.etapa-name.done{color:var(--green);}
.etapa-name.current{color:var(--accent);}
.etapa-name.pending{color:var(--muted);}
.etapa-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
.etapa-resp{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:2px;}
.etapa-right{flex-shrink:0;display:flex;align-items:center;}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:820px;max-height:92vh;overflow-y:auto;padding:1.8rem;animation:slideUp 0.22s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.4rem;gap:12px;}
.modal-title{font-size:1.1rem;font-weight:700;flex:1;}
.modal-close{background:var(--surface2);border:none;color:var(--muted);font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#0e0e0e;padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:700;font-family:var(--mono);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);z-index:9998;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);color:#fff;}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-family:var(--mono);font-size:13px;}
.divider-row{display:flex;align-items:center;gap:8px;margin:8px 0 12px;}
.divider-line{flex:1;height:0.5px;background:var(--border);}
.divider-txt{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}
.info-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.info-chip{display:inline-flex;flex-direction:column;gap:1px;background:var(--surface2);border-radius:8px;padding:8px 12px;}
.ic-label{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-family:var(--mono);}
.ic-val{font-size:13px;font-weight:600;color:var(--text);}
.nota-box{background:var(--surface2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--muted);font-family:var(--mono);line-height:1.5;margin-bottom:14px;}
.section-sep{display:flex;align-items:center;gap:10px;margin:16px 0 10px;}
.section-sep-label{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;font-family:var(--mono);white-space:nowrap;color:var(--muted);}
.section-sep-line{flex:1;height:0.5px;background:var(--border);}
.emp-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-bottom:0.5px solid var(--border);border-radius:6px;margin:0 -8px;}
.emp-row:last-child{border-bottom:none;}
.emp-name{flex:1;font-size:14px;font-weight:600;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

@media(max-width:520px){
  .form-grid{grid-template-columns:1fr;}
  .form-grid .full{grid-column:1;}
  .main-content{padding:16px;}
  .topbar{padding:0 16px;}
  .prod-table input[type="number"]{width:60px;}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Conectando...</div>
</div>

<div id="splash">
  <div class="logo-block">
    <div class="logo-label">Break 7.52 · Red de tiendas</div>
    <div class="logo-title">Remitos de<br><span>Traslado</span></div>
    <div class="logo-sub">Sistema interno — acceso restringido</div>
    <div class="splash-stats">
      <div class="splash-stat"><div class="splash-stat-label">En curso</div><div class="splash-stat-val sv-active" id="splash-active">0</div></div>
      <div class="splash-stat"><div class="splash-stat-label">Completados</div><div class="splash-stat-val sv-done" id="splash-done">0</div></div>
    </div>
  </div>
  <div class="login-box">
    <h2>¿Quién sos?</h2>
    <div class="field-group">
      <div class="field-label">Tienda / Rol</div>
      <select id="rol-select"><option value="">— Seleccioná tu rol —</option></select>
    </div>
    <button class="btn btn-primary" onclick="loginRol()">Ingresar</button>
    <div style="border-top:0.5px solid var(--border);padding-top:1rem;display:flex;flex-direction:column;gap:10px;">
      <div class="field-label">Acceso administración</div>
      <input type="password" id="admin-pin" placeholder="PIN de administrador" />
      <div class="err-msg" id="pin-err">PIN incorrecto.</div>
      <button class="btn btn-ghost" onclick="loginAdmin()">Entrar como admin</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">Break <span>7.52</span></div>
      <div class="topbar-sub">remitos de traslado</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="main-content">

    <!-- VISTA ROL -->
    <div id="view-rol" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('activos-rol',this,'rol')">En curso</button>
        <button class="tab-btn" onclick="switchTab('hist-rol',this,'rol')">Historial</button>
        <button class="tab-btn" id="tab-btn-ruta-rol" style="display:none;" onclick="switchTab('ruta-rol',this,'rol');renderRuta()">Ruta 🗺</button>
        <button class="tab-btn" id="tab-btn-nueva-rol" style="display:none;" onclick="switchTab('nueva-rol',this,'rol')">Nueva orden</button>
      </div>
      <div id="tab-activos-rol" class="tab-panel active"><div id="list-activos-rol"></div></div>
      <div id="tab-hist-rol" class="tab-panel"><div id="list-hist-rol"></div></div>
      <div id="tab-ruta-rol" class="tab-panel"><div id="ruta-content"></div></div>
      <div id="tab-nueva-rol" class="tab-panel"><div id="form-nueva-rol"></div></div>
    </div>

    <!-- VISTA ADMIN -->
    <div id="view-admin" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('activos-admin',this,'admin')">En curso</button>
        <button class="tab-btn" onclick="switchTab('hist-admin',this,'admin')">Historial</button>
        <button class="tab-btn" onclick="switchTab('nueva-admin',this,'admin')">Nueva orden</button>
        <button class="tab-btn" onclick="switchTab('config-admin',this,'admin')">Tiendas</button>
      </div>
      <div id="tab-activos-admin" class="tab-panel active"><div id="list-activos-admin"></div></div>
      <div id="tab-hist-admin" class="tab-panel"><div id="list-hist-admin"></div></div>
      <div id="tab-nueva-admin" class="tab-panel"><div id="form-nueva-admin"></div></div>
      <div id="tab-config-admin" class="tab-panel"><div id="config-tiendas"></div></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Remito</div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ SUPABASE ══
const SURL = 'https://oiuualqixcccfhtpcist.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pdXVhbHFpeGNjY2ZodHBjaXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzUxNjEsImV4cCI6MjA4OTQ1MTE2MX0.ms4MHVhKDTKfID0WGi05EFPySf350SA66uNi4wPfsOo';
let H = {'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=representation'};
// Cargar app_secret para RLS — se adjunta a H al arrancar
(async () => {
  try {
    const r = await fetch(`${SURL}/rest/v1/config?clave=eq.app_secret&select=valor`, {
      headers: {'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json'}
    });
    const d = await r.json();
    if (d?.[0]?.valor) H = {...H, 'x-app-secret': d[0].valor};
  } catch(e) { console.warn('[remitos] app_secret no disponible', e); }
})();
async function sbGet(t,p=''){const r=await fetch(`${SURL}/rest/v1/${t}?${p}`,{headers:H});return r.json();}
async function sbPost(t,b){const r=await fetch(`${SURL}/rest/v1/${t}`,{method:'POST',headers:H,body:JSON.stringify(b)});return r.json();}
async function sbPatch(t,p,b){const r=await fetch(`${SURL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:H,body:JSON.stringify(b)});return r.json();}
async function sbDelete(t,p){await fetch(`${SURL}/rest/v1/${t}?${p}`,{method:'DELETE',headers:H});}

// ══ ETAPAS ══
const ETAPAS = [
  {id:'stock',     label:'Stock confirmado disponible',   resp:'origen',     icon:'📦'},
  {id:'facturado', label:'Facturado — listo para retirar',resp:'origen',     icon:'🧾'},
  {id:'en_camino', label:'Retirado — en camino',          resp:'repartidor', icon:'🚗'},
  {id:'entregado', label:'Entregado en destino',           resp:'destino',    icon:'✅'},
  {id:'activado',  label:'Activado en plataformas',        resp:'destino',    icon:'📲'},
  {id:'registrado',label:'Registrado en sistema',          resp:'destino',    icon:'📋'},

function filtrarProductos(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase();
  return PRODUCTOS_DEFAULT.filter(p => p.toLowerCase().includes(q)).slice(0, 40);
}

function actualizarDatalist(inputEl, datalistId) {
  const dl = document.getElementById(datalistId);
  if (!dl) return;
  const resultados = filtrarProductos(inputEl.value);
  dl.innerHTML = resultados.map(p => `<option value="${p.replace(/"/g,'&quot;')}">`).join('');
}

const PALETA = ['var(--accent)','var(--blue)','var(--purple)','var(--orange)','var(--green)','var(--red)'];
function colorTienda(id) {

}
function nombreTienda(id) {
  if (id==='repartidor') return 'Repartidor';

}

// ══ INIT ══
async function sbGetT(t, p='') {
  const r = await fetch(`${SURL}/rest/v1/${t}?${p}`, {headers:H});
  if (!r.ok) {
    const body = await r.json().catch(()=>({}));
    throw new Error(`[${r.status}] tabla "${t}": ${body.message || body.hint || r.statusText}`);
  }
  return r.json();
}

async function init() {
  const loadingText = document.getElementById('loading-overlay').querySelector('.loading-text');
  try {
    loadingText.textContent = 'Conectando con Supabase...';
    const [rows, tRows, cfgRows] = await Promise.all([
      sbGetT('remitos','order=created_at.desc'),
      sbGetT('tiendas_remitos','order=nombre'),
      sbGetT('config','clave=eq.pin_remitos')
    ]);

    if (!Array.isArray(rows)) throw new Error('No se pudo cargar remitos');
    if (!Array.isArray(tRows)) throw new Error('No se pudo cargar tiendas');

    remitos = rows || [];
    tiendas = tRows || [];
    pin = cfgRows && cfgRows[0] ? cfgRows[0].valor : '1234';

    if (!tiendas.length) {
      loadingText.textContent = 'Configurando tiendas...';
      const defaults = ['Thames','Roosevelt','Juramento','Independencia'];
      for (const n of defaults) {
        const id = n.toLowerCase();
        const r = await sbPost('tiendas_remitos',{id,nombre:n});
        if (r&&r[0]) tiendas.push(r[0]);
      }
    }
    populateRolSelect();
    updateSplashStats();
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('splash').style.display='flex';
  } catch(e) {
    console.error('Error init:', e);
    loadingText.innerHTML = `⚠️ Error al conectar.<br><br><span style="font-size:11px;opacity:0.8;">${e.message || 'Revisá tu conexión e intentá de nuevo.'}</span>`;
    loadingText.style.cssText = 'color:#e05555;font-size:13px;text-align:center;max-width:260px;line-height:1.6;';
    // Botón de reintento
    const btn = document.createElement('button');
    btn.textContent = 'Reintentar';
    btn.style.cssText = 'margin-top:16px;padding:10px 24px;background:#e8c87a;color:#0e0e0e;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;';
    btn.onclick = () => { loadingText.style.cssText=''; loadingText.textContent='Conectando...'; btn.remove(); init(); };
    document.getElementById('loading-overlay').appendChild(btn);
  }
}
init();

// ══ HUB INTEGRATION (iframe postMessage) ══
// Cuando remitos.html corre dentro del iframe del hub, recibe el contexto
// { type:'break-context', local, localName, turno, empleado, rol }
// y hace auto-login saltando el splash propio.
if (window.parent !== window) {
  document.body.classList.add('in-iframe');
}

// Mapa de claves del hub → fragmento del nombre de tienda en remitos
// Se usa para hacer match dinámico contra tiendas[] cargadas desde Supabase
const HUB_LOCAL_NOMBRE = {
  palermo:     'thames',
  belgrano:    'roosevelt',
  barrio_chino:'juramento',
  san_telmo:   'independencia',
};

// Busca el ID real de la tienda en el array tiendas[] comparando por nombre (case-insensitive)
function resolverTiendaId(hubLocalKey) {
  const fragmento = HUB_LOCAL_NOMBRE[hubLocalKey] || hubLocalKey;
  const match = tiendas.find(t => t.nombre.toLowerCase().includes(fragmento));
  return match ? match.id : fragmento;  // fallback al fragmento si no hay match
}

window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'break-context') return;
  const ctx = e.data;

  if (ctx.rol === 'admin' || ctx.rol === 'encargado') {
    currentRol  = 'admin';
    currentUser = ctx.rol === 'encargado' ? `Encargado · ${ctx.localName || ''}` : 'Administración';
    hubLocal    = null;   // admin/encargado ve todo
  } else if (ctx.rol === 'repartidor') {
    currentRol  = 'repartidor';
    currentUser = 'Repartidor';
    hubLocal    = null;   // repartidor ve todos los remitos
  } else {
    // Esperar a que init() termine (tiendas[] esté cargado) antes de resolver el ID
    const tryResolve = () => {
      if (document.getElementById('loading-overlay').style.display !== 'none') {
        setTimeout(tryResolve, 200); return;
      }
      const tiendaId  = resolverTiendaId(ctx.local);
      currentRol      = tiendaId;
      currentUser     = ctx.localName || tiendaId;
      hubLocal        = tiendaId;   // empleado/encargado: solo ve su tienda
      enterApp();
    };
    tryResolve();
    return;  // enterApp se llama dentro de tryResolve
  }

  // Para admin y repartidor, esperar que init() termine
  const tryEnter = () => {
    if (document.getElementById('loading-overlay').style.display !== 'none') {
      setTimeout(tryEnter, 200); return;
    }
    enterApp();
  };
  tryEnter();
});

function currentEtapaIdx(r){return ETAPAS.findIndex(e=>!r.etapas_completadas[e.id]);}
function isCompleted(r){return ETAPAS.every(e=>r.etapas_completadas[e.id]);}
function progreso(r){return ETAPAS.filter(e=>r.etapas_completadas[e.id]).length;}
function stockConfirmado(r){return !!(r.etapas_completadas && r.etapas_completadas['stock']);}

function canComplete(r){
  if (currentRol==='admin') return true;
  const idx=currentEtapaIdx(r); if(idx===-1) return false;
  const e=ETAPAS[idx];
  // Cuando viene del hub, usar hubLocal para determinar si puede actuar como origen/destino
  const rolEfectivo = hubLocal || currentRol;
  if(e.resp==='origen')     return rolEfectivo===r.origen;
  if(e.resp==='destino')    return rolEfectivo===r.destino;
  if(e.resp==='repartidor') return currentRol==='repartidor';
  return false;
}
function canEditProductos(r){
  // Solo antes de confirmar stock, solo tienda origen o admin
  if (stockConfirmado(r)) return false;
  const rolEfectivo = hubLocal || currentRol;
  return currentRol==='admin' || rolEfectivo===r.origen;
}
function canConfirmarCantidad(r){
  // Solo la tienda origen puede editar cantidad confirmada, antes de "facturado"
  if (r.etapas_completadas['facturado']) return false;
  const rolEfectivo = hubLocal || currentRol;
  return rolEfectivo===r.origen || currentRol==='admin';
}

  document.getElementById('splash-active').textContent=remitos.filter(r=>!isCompleted(r)).length;
  document.getElementById('splash-done').textContent=remitos.filter(r=>isCompleted(r)).length;
}

// ══ AUTH ══
function loginRol(){
  const rol=document.getElementById('rol-select').value;
  if(!rol){showToast('Seleccioná tu rol primero.',true);return;}
  currentRol=rol; currentUser=nombreTienda(rol); enterApp();
}
function loginAdmin(){
  if(document.getElementById('admin-pin').value!==pin){document.getElementById('pin-err').style.display='block';return;}
  document.getElementById('pin-err').style.display='none';
  currentRol='admin'; currentUser='Administración'; enterApp();
}
function enterApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='flex';
  const color = currentRol==='admin'?'var(--accent)':(currentRol==='repartidor'?'var(--green)':colorTienda(currentRol));
  document.getElementById('topbar-user').innerHTML=

    }

}
async function logout(){
  // Si estamos dentro del iframe del hub, volver al hub en vez de mostrar el splash propio
  if (window.parent !== window) {
    try { window.parent.postMessage({type:'break-goback'}, '*'); } catch(e) {}
    return;
  }
  showLoading('Actualizando...');
  try{
    const [rows,tRows,cfgRows]=await Promise.all([
      sbGet('remitos','order=created_at.desc'),
      sbGet('tiendas_remitos','order=nombre'),
      sbGet('config','clave=eq.pin_remitos')
    ]);
    remitos=rows||[]; tiendas=tRows||[];
    pin=cfgRows&&cfgRows[0]?cfgRows[0].valor:'1234';
    populateRolSelect(); updateSplashStats();
  }catch(e){}
  hideLoading();
  currentRol=currentUser=null;
  document.getElementById('splash').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('admin-pin').value='';
  document.getElementById('rol-select').value='';
}

// ══ RENDER REMITO CARD ══
function remitoCardHTML(r, showActions){
  const prog=progreso(r), pct=Math.round(prog/ETAPAS.length*100), comp=isCompleted(r);
  const nextIdx=currentEtapaIdx(r), nextEtapa=nextIdx>=0?ETAPAS[nextIdx]:null;
  const puedo=showActions&&canComplete(r);
  const productos=r.productos||[];
  const resumen=productos.slice(0,2).map(p=>`${p.qty_solicitada}x ${p.nombre}`).join(', ')+(productos.length>2?` +${productos.length-2} más`:'');
  return `<div class="remito-card ${comp?'completed':''}" onclick="openModal('${r.id}')">
    <div class="remito-header">
      <div>
        <div class="remito-id">#${r.codigo} · ${r.fecha_creacion}</div>
        <div class="remito-title">${resumen||'Sin productos'}</div>
        <div class="remito-route">
          <span class="route-store" style="color:${colorTienda(r.origen)}">${nombreTienda(r.origen)}</span>
          <span style="color:var(--muted)">→</span>
          <span class="route-store" style="color:${colorTienda(r.destino)}">${nombreTienda(r.destino)}</span>
        </div>
      </div>
      <div class="remito-status-badge ${comp?'status-done':'status-active'}">
        ${comp?'✓ Completado':`Etapa ${prog}/${ETAPAS.length}`}
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${comp?'Todas las etapas completadas':(nextEtapa?`Pendiente: ${nextEtapa.label}`:'')}</div>
    </div>
    ${puedo&&!comp?`<div onclick="event.stopPropagation()"><button class="btn-step" onclick="completarEtapa(event,'${r.id}')">Completar: ${nextEtapa.label} →</button></div>`:''}
  </div>`;
}

        <thead><tr><th>Producto</th><th>Cant. solicitada</th><th></th></tr></thead>

function agregarLineaNueva(containerId){
  lineasNueva.push({nombre:'',qty_solicitada:1});
  renderFormNueva(containerId);
}
function eliminarLineaNueva(idx){
  lineasNueva.splice(idx,1);
  if(!lineasNueva.length) lineasNueva=[{nombre:'',qty_solicitada:1}];
  const cid=currentRol==='admin'?'form-nueva-admin':'form-nueva-rol';
  renderFormNueva(cid);
}

async function crearOrden(containerId){
  const origen =document.getElementById(`n-origen-${containerId}`).value;
  const destino=document.getElementById(`n-destino-${containerId}`).value;
  const notas  =document.getElementById(`n-notas-${containerId}`).value.trim();
  if(!origen)  {showToast('Seleccioná la tienda origen.',true);return;}
  if(!destino) {showToast('Seleccioná la tienda destino.',true);return;}
  if(origen===destino){showToast('Origen y destino no pueden ser la misma tienda.',true);return;}
  const productosValidos=lineasNueva.filter(l=>l.nombre.trim());
  if(!productosValidos.length){showToast('Agregá al menos un producto.',true);return;}

  showLoading('Creando orden...');
  const etapas_completadas={};
  const etapas_timestamps={};
  ETAPAS.forEach(e=>{etapas_completadas[e.id]=false;etapas_timestamps[e.id]=null;});

  const productos=productosValidos.map(l=>({
    nombre:l.nombre.trim(),
    qty_solicitada:l.qty_solicitada||1,
    qty_confirmada:null
  }));

  const nueva={
    codigo:uid(), origen, destino,
    productos, notas,
    fecha_creacion:now(),
    creado_por:currentUser,
    etapas_completadas, etapas_timestamps,
    completado:false
  };

  const res=await sbPost('remitos',nueva);
  if(res&&res[0]){
    remitos.unshift(res[0]);
    lineasNueva=[{nombre:'',qty_solicitada:1}];
    if(currentRol==='admin'){renderAdmin();document.querySelectorAll('#view-admin .tab-btn')[0].click();}
    else{renderRol();renderFormNueva(containerId);document.querySelectorAll('#view-rol .tab-btn')[0].click();}
    showToast('Orden creada correctamente.');
  } else {showToast('Error al crear la orden.',true);}
  hideLoading();
}

// ══ COMPLETAR ETAPA ══
async function completarEtapa(event,remitoId){
  event.stopPropagation();
  const r=remitos.find(x=>x.id===remitoId); if(!r) return;
  const idx=currentEtapaIdx(r); if(idx===-1) return;
  const etapa=ETAPAS[idx];
  if(!canComplete(r)){showToast('No tenés permiso para completar esta etapa.',true);return;}

  // Validar que todos los productos tengan qty_confirmada antes de pasar de stock
  if(etapa.id==='stock'){
    const sinConfirmar=r.productos.filter(p=>p.qty_confirmada===null||p.qty_confirmada===undefined);
    if(sinConfirmar.length){showToast('Confirmá la cantidad de todos los productos antes de avanzar.',true);return;}
  }

  showLoading('Guardando...');
  const nuevasComp={...r.etapas_completadas,[etapa.id]:true};
  const nuevasTs={...r.etapas_timestamps,[etapa.id]:now()};
  const todasListas=ETAPAS.every(e=>nuevasComp[e.id]);

  const res=await sbPatch('remitos',`id=eq.${remitoId}`,{
    etapas_completadas:nuevasComp,
    etapas_timestamps:nuevasTs,
    completado:todasListas
  });
  if(res&&res[0]){
    const i=remitos.findIndex(x=>x.id===remitoId);
    remitos[i]=res[0];
    if(currentRol==='admin') renderAdmin(); else renderRol();
    if(modalRemitoId===remitoId) renderModalBody();
    showToast(todasListas?'¡Orden completada!':`"${etapa.label}" completada.`);
  } else {showToast('Error al guardar.',true);}
  hideLoading();
}

// ══ GUARDAR CANTIDAD CONFIRMADA ══
async function guardarCantidadesConfirmadas(remitoId){
  const r=remitos.find(x=>x.id===remitoId); if(!r) return;
  if(!canConfirmarCantidad(r)){showToast('No tenés permiso para modificar las cantidades.',true);return;}
  // Leer valores del modal
  const filas=document.querySelectorAll(`.qty-conf-input`);
  const nuevosProductos=r.productos.map((p,i)=>{
    const input=document.getElementById(`qconf-${remitoId}-${i}`);
    const val=input?parseInt(input.value):null;
    return {...p, qty_confirmada: (val>=0?val:null)};
  });
  showLoading('Guardando cantidades...');
  const res=await sbPatch('remitos',`id=eq.${remitoId}`,{productos:nuevosProductos});
  if(res&&res[0]){
    const i=remitos.findIndex(x=>x.id===remitoId);
    remitos[i]=res[0];
    renderModalBody();
    if(currentRol==='admin') renderAdmin(); else renderRol();
    showToast('Cantidades guardadas.');
  } else {showToast('Error al guardar.',true);}
  hideLoading();
}

// ══ AGREGAR / ELIMINAR PRODUCTO EN ORDEN EXISTENTE ══
async function agregarProductoExistente(remitoId){
  const r=remitos.find(x=>x.id===remitoId); if(!r) return;
  const nom=document.getElementById(`add-prod-nom-${remitoId}`).value.trim();
  const qty=parseInt(document.getElementById(`add-prod-qty-${remitoId}`).value)||1;
  if(!nom){showToast('Escribí el nombre del producto.',true);return;}
  showLoading('Guardando...');
  const nuevos=[...r.productos,{nombre:nom,qty_solicitada:qty,qty_confirmada:null}];
  const res=await sbPatch('remitos',`id=eq.${remitoId}`,{productos:nuevos});
  if(res&&res[0]){
    const i=remitos.findIndex(x=>x.id===remitoId);
    remitos[i]=res[0];
    renderModalBody();
    if(currentRol==='admin') renderAdmin(); else renderRol();
    showToast('Producto agregado.');
  } else {showToast('Error.',true);}
  hideLoading();
}
async function eliminarProductoExistente(remitoId,idx){
  const r=remitos.find(x=>x.id===remitoId); if(!r) return;
  if(r.productos.length<=1){showToast('Debe haber al menos un producto.',true);return;}
  showLoading('Guardando...');
  const nuevos=r.productos.filter((_,i)=>i!==idx);
  const res=await sbPatch('remitos',`id=eq.${remitoId}`,{productos:nuevos});
  if(res&&res[0]){
    const i=remitos.findIndex(x=>x.id===remitoId);
    remitos[i]=res[0];
    renderModalBody();
    if(currentRol==='admin') renderAdmin(); else renderRol();
    showToast('Producto eliminado.');
  } else {showToast('Error.',true);}
  hideLoading();
}

// ══ MODAL ══
function openModal(id){
  modalRemitoId=id; renderModalBody();
  document.getElementById('modal-backdrop').classList.add('open');
}

function renderModalBody(){
  const r=remitos.find(x=>x.id===modalRemitoId); if(!r) return;
  const comp=isCompleted(r);
  const nextIdx=currentEtapaIdx(r);
  const puedeEditarProds=canEditProductos(r);
  const puedeConfirmarQty=canConfirmarCantidad(r);

  document.getElementById('modal-title').textContent=`Remito #${r.codigo}`;

  // Tabla de productos
  const productos=r.productos||[];
  const prodFilas=productos.map((p,i)=>{
    const qconf=p.qty_confirmada;
    const confirmada=qconf!==null&&qconf!==undefined;
    const match=confirmada&&qconf===p.qty_solicitada;
    const diff=confirmada&&qconf!==p.qty_solicitada;
    const diffBadge=confirmada?(match?`<span class="diff-badge diff-ok">✓ exacto</span>`:`<span class="diff-badge diff-mod">ajustado</span>`):'';

    const celConf = puedeConfirmarQty
      ? `<input type="number" id="qconf-${r.id}-${i}" class="qty-conf-input" min="0" value="${confirmada?qconf:''}" placeholder="—" style="width:70px;padding:5px 8px;font-size:13px;" />`
      : `<span class="${confirmada?(match?'qty-match':'qty-diff'):'qty-pending'}">${confirmada?qconf:'—'}</span>`;

    const btnElim=puedeEditarProds?`<button class="btn btn-danger btn-sm" onclick="eliminarProductoExistente('${r.id}',${i})">✕</button>`:'';

    return `<tr>
      <td>${p.nombre}</td>
      <td><span class="qty-solicitada">${p.qty_solicitada}</span></td>
      <td>${celConf}${diffBadge}</td>
      ${puedeEditarProds||puedeConfirmarQty?`<td>${btnElim}</td>`:''}
    </tr>`;
  }).join('');

  const thAcciones=(puedeEditarProds||puedeConfirmarQty)?'<th></th>':'';
  const thConf='<th>Cant. confirmada '+(puedeConfirmarQty?'<span style="color:var(--accent);font-size:9px;">(editable)</span>':'')+'</th>';

  const addProdHTML=puedeEditarProds?`
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
      <datalist id="prod-list-modal"></datalist>
      <div class="field-group" style="flex:2;min-width:140px;">
        <div class="field-label">Producto</div>
        <input list="prod-list-modal" type="text" id="add-prod-nom-${r.id}" oninput="actualizarDatalist(this,'prod-list-modal')" placeholder="Nombre del producto..." />
      </div>
      <div class="field-group" style="width:90px;">
        <div class="field-label">Cantidad</div>
        <input type="number" id="add-prod-qty-${r.id}" min="1" value="1" />
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-bottom:2px;" onclick="agregarProductoExistente('${r.id}')">+ Agregar</button>
    </div>`:'';

  const guardarQtyBtn=puedeConfirmarQty?`<button class="btn btn-primary" style="margin-top:12px;" onclick="guardarCantidadesConfirmadas('${r.id}')">Guardar cantidades confirmadas →</button>`:'';

  // Etapas
  const etapasHTML=ETAPAS.map((e,i)=>{
    const hecha=r.etapas_completadas[e.id];
    const esCurrent=!comp&&i===nextIdx;
    const cls=hecha?'done':(esCurrent?'current':'pending');
    const iconCls=hecha?'ei-done':(esCurrent?'ei-current':'ei-pending');
    const iconChar=hecha?'✓':(esCurrent?'→':'·');
    const ts=r.etapas_timestamps&&r.etapas_timestamps[e.id];
    const respLabel=e.resp==='origen'?nombreTienda(r.origen):(e.resp==='destino'?nombreTienda(r.destino):'Repartidor');
    return `<div class="etapa-row">
      <div class="etapa-icon ${iconCls}">${iconChar}</div>
      <div class="etapa-body">
        <div class="etapa-name ${cls}">${e.label}</div>
        ${ts?`<div class="etapa-meta">${ts}</div>`:''}
        <div class="etapa-resp">Responsable: ${respLabel}</div>
      </div>
      <div class="etapa-right">
        ${esCurrent&&canComplete(r)?`<button class="btn-step" onclick="completarEtapa(event,'${r.id}')">Completar</button>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML=`
    <div class="info-row">
      <div class="info-chip"><span class="ic-label">Origen</span><span class="ic-val" style="color:${colorTienda(r.origen)}">${nombreTienda(r.origen)}</span></div>
      <div class="info-chip"><span class="ic-label">Destino</span><span class="ic-val" style="color:${colorTienda(r.destino)}">${nombreTienda(r.destino)}</span></div>
      <div class="info-chip"><span class="ic-label">Creado por</span><span class="ic-val">${r.creado_por||'—'}</span></div>
      <div class="info-chip"><span class="ic-label">Fecha</span><span class="ic-val">${r.fecha_creacion}</span></div>
    </div>

    ${r.notas?`<div class="nota-box">📝 ${r.notas}</div>`:''}

    <div class="divider-row"><div class="divider-line"></div><div class="divider-txt">productos del traslado</div><div class="divider-line"></div></div>
    <table class="prod-table">
      <thead><tr><th>Producto</th><th>Cant. solicitada</th>${thConf}${thAcciones}</tr></thead>
      <tbody>${prodFilas}</tbody>
    </table>
    ${guardarQtyBtn}
    ${addProdHTML}

    <div class="divider-row" style="margin-top:16px;"><div class="divider-line"></div><div class="divider-txt">estado de etapas</div><div class="divider-line"></div></div>
    <div class="progress-wrap" style="margin-bottom:12px;">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round(progreso(r)/ETAPAS.length*100)}%"></div></div>
      <div class="progress-label">${progreso(r)} de ${ETAPAS.length} etapas completadas</div>
    </div>
    <div class="etapas-list">${etapasHTML}</div>
  `;
}

      ${tiendas.map(t=>`<div class="emp-row">
        <div class="emp-name" style="color:${colorTienda(t.id)}">${t.nombre}</div>
        <button class="btn btn-danger btn-sm" onclick="eliminarTienda('${t.id}','${t.nombre}')">Eliminar</button>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Cambiar PIN de administrador</div>
      <div class="form-grid">
        <div class="field-group"><div class="field-label">PIN actual</div><input type="password" id="pin-actual-r" /></div>
        <div class="field-group"><div class="field-label">PIN nuevo</div><input type="password" id="pin-nuevo-r" /></div>
        <div class="full"><button class="btn btn-ghost" onclick="cambiarPin()">Actualizar PIN</button></div>
      </div>
    </div>`;
}

async function agregarTienda(){
  const nombre=document.getElementById('nueva-tienda-nom').value.trim();
  if(!nombre) return;
  if(tiendas.find(t=>t.nombre.toLowerCase()===nombre.toLowerCase())){showToast('Ya existe esa tienda.',true);return;}
  const id=nombre.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Date.now();
  showLoading('Guardando...');
  const res=await sbPost('tiendas_remitos',{id,nombre});
  if(res&&res[0]){
    tiendas.push(res[0]);
    document.getElementById('nueva-tienda-nom').value='';
    populateRolSelect();
    renderAdmin();
    showToast('Tienda agregada.');
  } else {showToast('Error al guardar.',true);}
  hideLoading();
}

async function eliminarTienda(id,nombre){
  if(!confirm(`¿Eliminar la tienda "${nombre}"? Sus remitos históricos se mantienen.`)) return;
  showLoading('Eliminando...');
  await sbDelete('tiendas_remitos',`id=eq.${id}`);
  tiendas=tiendas.filter(t=>t.id!==id);
  populateRolSelect(); renderAdmin();
  hideLoading(); showToast('Tienda eliminada.');
}

async function cambiarPin(){
  const actual=document.getElementById('pin-actual-r').value;
  const nuevo=document.getElementById('pin-nuevo-r').value;
  if(actual!==pin){showToast('PIN actual incorrecto.',true);return;}
  if(!nuevo||nuevo.length<4){showToast('El PIN debe tener al menos 4 caracteres.',true);return;}
  showLoading('Guardando...');
  await sbPatch('config','clave=eq.pin_remitos',{valor:nuevo});
  pin=nuevo;
  document.getElementById('pin-actual-r').value='';
  document.getElementById('pin-nuevo-r').value='';
  hideLoading(); showToast('PIN actualizado.');
}

// ══ RUTA ÓPTIMA PARA REPARTIDOR ══
// Distancias relativas entre locales (simétricas, en minutos de viaje estimados)
// Roosevelt ↔ Juramento: misma zona, muy cerca
// Thames (Palermo) está de paso hacia San Telmo desde el norte
// San Telmo es el extremo sur
const DIST_ENTRE = {
  'thames':       { 'thames':0,  'roosevelt':15, 'juramento':12, 'independencia':25 },
  'roosevelt':    { 'thames':15, 'roosevelt':0,  'juramento':8,  'independencia':35 },
  'juramento':    { 'thames':12, 'roosevelt':8,  'juramento':0,  'independencia':30 },
  'independencia':{ 'thames':25, 'roosevelt':35, 'juramento':30, 'independencia':0  },
};

function nombreCortoTienda(id){
  if(!id) return id;
  const s = id.toLowerCase();
  if(s.includes('thames')||s.includes('palermo')) return 'thames';
  if(s.includes('roosevelt')||s.includes('belgrano')) return 'roosevelt';
  if(s.includes('juramento')||s.includes('chino')) return 'juramento';
  if(s.includes('independencia')||s.includes('telmo')) return 'independencia';
  return s;
}

const LOCAL_DISPLAY = {
  thames:        'Thames · Palermo',
  roosevelt:     'Roosevelt · Belgrano',
  juramento:     'Juramento · B. Chino',
  independencia: 'Independencia · S. Telmo',
};

function calcularRutaOptima(paradas) {
  // Nearest-neighbor heuristic desde cada punto de inicio, tomar la mejor
  if(paradas.length <= 1) return paradas;
  let mejorRuta = null, mejorCosto = Infinity;
  for(let inicio=0; inicio<paradas.length; inicio++){
    const visitados = new Set();
    const ruta = [paradas[inicio]];
    visitados.add(paradas[inicio]);
    while(ruta.length < paradas.length){
      const actual = ruta[ruta.length-1];
      let cercano = null, minDist = Infinity;
      for(const p of paradas){
        if(visitados.has(p)) continue;
        const d = (DIST_ENTRE[actual]||{})[p] ?? 99;
        if(d < minDist){ minDist=d; cercano=p; }
      }
      if(!cercano) break;
      ruta.push(cercano);
      visitados.add(cercano);
    }
    // Costo total de esta ruta
    let costo = 0;
    for(let i=0;i<ruta.length-1;i++) costo += (DIST_ENTRE[ruta[i]]||{})[ruta[i+1]] ?? 99;
    if(costo < mejorCosto){ mejorCosto=costo; mejorRuta=ruta; }
  }
  return mejorRuta || paradas;
}

function renderRuta(){
  const el = document.getElementById('ruta-content');
  if(!el) return;

  // Remitos activos (en curso, no completados) que involucran al repartidor
  const activos = remitos.filter(r => !isCompleted(r));
  if(!activos.length){
    el.innerHTML = `<div style="text-align:center;padding:40px 20px;font-family:var(--mono);font-size:12px;color:var(--muted)">No hay remitos activos en este momento.</div>`;
    return;
  }

  // Recolectar todas las tiendas involucradas como paradas únicas
  const paradasSet = new Set();
  activos.forEach(r => {
    paradasSet.add(nombreCortoTienda(r.origen));
    paradasSet.add(nombreCortoTienda(r.destino));
  });
  const paradas = Array.from(paradasSet);
  const rutaOptima = calcularRutaOptima(paradas);

  // Agrupar remitos por tramo de la ruta óptima
  // Un remito pertenece al tramo A→B si su origen o destino coincide con A o B
  // Mostrar en el orden de la ruta

  let html = `
    <div style="padding:16px 0 8px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">
      Ruta sugerida · ${rutaOptima.length} paradas
    </div>
    <div style="margin-bottom:20px;display:flex;flex-direction:column;gap:0">
  `;

  rutaOptima.forEach((parada, i) => {
    const esUltima = i === rutaOptima.length - 1;
    const sig = rutaOptima[i+1];
    const minutos = sig ? ((DIST_ENTRE[parada]||{})[sig] ?? '?') : null;

    // Remitos que pasan por esta parada (origen o destino)
    const remitosParada = activos.filter(r =>
      nombreCortoTienda(r.origen)===parada || nombreCortoTienda(r.destino)===parada
    );

    const etiquetaParada = LOCAL_DISPLAY[parada] || parada;
    const colorParada = parada==='thames'?'var(--purple)':parada==='roosevelt'?'var(--blue)':parada==='juramento'?'var(--teal)':'var(--orange)';

    html += `
      <div style="display:flex;gap:12px;align-items:stretch">
        <div style="display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0">
          <div style="width:28px;height:28px;border-radius:50%;background:${colorParada};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#000;flex-shrink:0">${i+1}</div>
          ${!esUltima?`<div style="width:2px;flex:1;min-height:32px;background:var(--border2);margin:4px 0"></div>`:''}
        </div>
        <div style="flex:1;padding-bottom:${esUltima?'0':'16px'}">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">${etiquetaParada}</div>
          ${remitosParada.length ? remitosParada.map(r => {
            const esOrigen = nombreCortoTienda(r.origen)===parada;
            const otra = esOrigen ? (LOCAL_DISPLAY[nombreCortoTienda(r.destino)]||r.destino) : (LOCAL_DISPLAY[nombreCortoTienda(r.origen)]||r.origen);
            const accion = esOrigen ? '📤 Retirar de acá →' : '📥 Entregar acá ←';
            const etapaIdx = currentEtapaIdx(r);
            const etapaLabel = etapaIdx>=0 ? ETAPAS[etapaIdx].label : 'Completado';
            return `<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;font-family:var(--mono);font-size:11px">
              <div style="color:var(--accent);font-weight:600;margin-bottom:4px">${r.codigo}</div>
              <div style="color:var(--muted);margin-bottom:2px">${accion} <span style="color:var(--text2)">${otra}</span></div>
              <div style="color:var(--muted)">${r.productos?.length||0} producto(s) · ${etapaLabel}</div>
            </div>`;
          }).join('') : `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);font-style:italic;padding:4px 0">Sin remitos en esta parada</div>`}
          ${!esUltima ? `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">≈ ${minutos} min hasta la siguiente parada</div>` : ''}
        </div>
      </div>
    `;
  });

  html += `</div>`;

  // Resumen de tiempo total estimado
  let tiempoTotal = 0;
  for(let i=0;i<rutaOptima.length-1;i++){
    tiempoTotal += (DIST_ENTRE[rutaOptima[i]]||{})[rutaOptima[i+1]] ?? 0;
  }
  html += `<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-family:var(--mono);font-size:11px;color:var(--muted)">
    Tiempo total estimado de traslado: <span style="color:var(--text);font-weight:600">${tiempoTotal} min</span>
    &nbsp;·&nbsp; ${rutaOptima.length} paradas &nbsp;·&nbsp; ${activos.length} remito(s) activo(s)
  </div>`;

  el.innerHTML = html;
}

function switchTab(tab,btn,scope){
  const view=scope==='admin'?'#view-admin':'#view-rol';
  document.querySelectorAll(`${view} .tab-btn`).forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`${view} .tab-panel`).forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}
